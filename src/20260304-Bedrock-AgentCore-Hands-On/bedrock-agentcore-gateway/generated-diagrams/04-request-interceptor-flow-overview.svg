<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <!-- Define arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#232F3E"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3F8624"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#DD344C"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="bold" fill="#232F3E" text-anchor="middle">Request Interceptor 처리 흐름</text>

  <!-- Start: 요청 수신 -->
  <ellipse cx="450" cy="80" rx="70" ry="30" fill="#147EBA" stroke="#147EBA" stroke-width="2"/>
  <text x="450" y="87" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">요청 수신</text>

  <!-- Arrow -->
  <line x1="450" y1="110" x2="450" y2="140" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: JWT에서 client_id 추출 -->
  <rect x="350" y="140" width="200" height="50" rx="6" fill="#FFFFFF" stroke="#232F3E" stroke-width="1"/>
  <text x="450" y="170" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E" text-anchor="middle">JWT에서 client_id 추출</text>

  <!-- Arrow -->
  <line x1="450" y1="190" x2="450" y2="220" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Decision 1: MCP Method? -->
  <path d="M 450 220 L 550 260 L 450 300 L 350 260 Z" fill="#FFF3E0" stroke="#DD6B10" stroke-width="2"/>
  <text x="450" y="265" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E" text-anchor="middle">MCP Method?</text>

  <!-- Branch: tools/list -->
  <line x1="550" y1="260" x2="650" y2="260" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <text x="600" y="250" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle">tools/list</text>
  
  <ellipse cx="730" cy="260" rx="80" ry="30" fill="#3F8624" stroke="#3F8624" stroke-width="2"/>
  <text x="730" y="267" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">ALLOW (통과)</text>

  <!-- Branch: tools/call -->
  <line x1="450" y1="300" x2="450" y2="330" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="490" y="320" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="12" fill="#666666" text-anchor="start">tools/call</text>

  <!-- Step 4: DynamoDB에서 권한 조회 -->
  <rect x="350" y="330" width="200" height="50" rx="6" fill="#E8F5E9" stroke="#3F8624" stroke-width="2"/>
  <text x="450" y="360" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E" text-anchor="middle">DynamoDB에서 권한 조회</text>

  <!-- Arrow -->
  <line x1="450" y1="380" x2="450" y2="410" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Decision 2: 도구 사용 권한 있음? -->
  <path d="M 450 410 L 570 460 L 450 510 L 330 460 Z" fill="#FFF3E0" stroke="#DD6B10" stroke-width="2"/>
  <text x="450" y="455" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E" text-anchor="middle">도구 사용</text>
  <text x="450" y="472" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E" text-anchor="middle">권한 있음?</text>

  <!-- Branch: Yes -->
  <line x1="570" y1="460" x2="650" y2="460" stroke="#3F8624" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <text x="610" y="450" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="12" fill="#3F8624" text-anchor="middle">Yes</text>
  
  <ellipse cx="750" cy="460" rx="90" ry="30" fill="#3F8624" stroke="#3F8624" stroke-width="2"/>
  <text x="750" y="467" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">ALLOW (도구 실행)</text>

  <!-- Branch: No -->
  <line x1="330" y1="460" x2="250" y2="460" stroke="#DD344C" stroke-width="2" marker-end="url(#arrowhead-red)"/>
  <text x="290" y="450" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="12" fill="#DD344C" text-anchor="middle">No</text>
  
  <ellipse cx="150" cy="460" rx="100" ry="30" fill="#DD344C" stroke="#DD344C" stroke-width="2"/>
  <text x="150" y="467" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">DENY (접근 거부)</text>

</svg>