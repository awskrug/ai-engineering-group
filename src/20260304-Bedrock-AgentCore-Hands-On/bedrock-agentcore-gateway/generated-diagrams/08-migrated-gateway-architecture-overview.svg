<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <!-- Definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#232F3E"/>
    </marker>
    <marker id="arrowhead-secondary" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#999999"/>
    </marker>
  </defs>

  <!-- AWS Cloud Boundary -->
  <rect x="180" y="40" width="800" height="520" fill="none" stroke="#232F3E" stroke-width="2" stroke-dasharray="8,4" rx="12"/>
  <text x="200" y="65" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E">AWS Cloud</text>

  <!-- Client (Outside Cloud) -->
  <rect x="20" y="180" width="140" height="120" fill="#E6F2FF" stroke="#147EBA" stroke-width="2" rx="6"/>
  <text x="90" y="205" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E" text-anchor="middle">Client</text>
  <text x="90" y="225" font-family="Amazon Ember, Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle">HR Web App</text>
  <rect x="35" y="240" width="110" height="25" fill="#FFFFFF" stroke="#147EBA" stroke-width="1" rx="4"/>
  <text x="90" y="257" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#232F3E" text-anchor="middle">HR Manager</text>
  <rect x="35" y="270" width="110" height="25" fill="#FFFFFF" stroke="#147EBA" stroke-width="1" rx="4"/>
  <text x="90" y="287" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#232F3E" text-anchor="middle">Employee</text>

  <!-- Amazon Cognito -->
  <rect x="210" y="180" width="140" height="100" fill="#FFF3E0" stroke="#DD6B10" stroke-width="2" rx="6"/>
  <text x="280" y="205" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E" text-anchor="middle">Amazon Cognito</text>
  <text x="280" y="225" font-family="Amazon Ember, Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle">인증 (JWT)</text>
  <text x="280" y="250" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#DD6B10" text-anchor="middle">client_credentials</text>
  <text x="280" y="265" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#DD6B10" text-anchor="middle">→ JWT</text>

  <!-- Amazon Bedrock AgentCore Gateway (Main Box) -->
  <rect x="390" y="100" width="340" height="280" fill="#F5F5F5" stroke="#232F3E" stroke-width="2" stroke-dasharray="4,2" rx="8"/>
  <text x="560" y="125" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E" text-anchor="middle">Amazon Bedrock</text>
  <text x="560" y="143" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E" text-anchor="middle">AgentCore Gateway</text>

  <!-- Policy Engine -->
  <rect x="410" y="160" width="300" height="60" fill="#F2E8FF" stroke="#8C4FFF" stroke-width="2" rx="6"/>
  <text x="560" y="182" font-family="Amazon Ember, Arial, sans-serif" font-size="13" font-weight="bold" fill="#232F3E" text-anchor="middle">Policy Engine</text>
  <text x="560" y="200" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#666666" text-anchor="middle">client_id 기반 접근 제어</text>
  <text x="560" y="214" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#8C4FFF" text-anchor="middle">(ENFORCE 모드)</text>

  <!-- Gateway Target -->
  <rect x="410" y="235" width="300" height="50" fill="#FFFFFF" stroke="#232F3E" stroke-width="2" rx="6"/>
  <text x="560" y="265" font-family="Amazon Ember, Arial, sans-serif" font-size="13" font-weight="bold" fill="#232F3E" text-anchor="middle">Gateway Target</text>

  <!-- Response Interceptor -->
  <rect x="410" y="300" width="300" height="60" fill="#FDE8E8" stroke="#DD344C" stroke-width="2" rx="6"/>
  <text x="560" y="322" font-family="Amazon Ember, Arial, sans-serif" font-size="13" font-weight="bold" fill="#232F3E" text-anchor="middle">Response Interceptor</text>
  <text x="560" y="340" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#666666" text-anchor="middle">PII 마스킹 +</text>
  <text x="560" y="354" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#666666" text-anchor="middle">tools/list 필터링</text>

  <!-- AWS Lambda - HR Tools -->
  <rect x="390" y="420" width="180" height="100" fill="#E6F2FF" stroke="#147EBA" stroke-width="2" rx="6"/>
  <text x="480" y="445" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E" text-anchor="middle">AWS Lambda</text>
  <text x="480" y="463" font-family="Amazon Ember, Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle">HR Tools</text>
  <text x="480" y="490" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#147EBA" text-anchor="middle">4개 HR 도구</text>

  <!-- Amazon DynamoDB -->
  <rect x="610" y="420" width="160" height="100" fill="#E8F5E9" stroke="#3F8624" stroke-width="2" rx="6"/>
  <text x="690" y="445" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E" text-anchor="middle">Amazon</text>
  <text x="690" y="463" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E" text-anchor="middle">DynamoDB</text>
  <text x="690" y="485" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#666666" text-anchor="middle">Employees</text>
  <text x="690" y="500" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#666666" text-anchor="middle">LeaveRecords</text>
  <text x="690" y="515" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#666666" text-anchor="middle">Permissions</text>

  <!-- Amazon Bedrock Guardrails -->
  <rect x="800" y="180" width="160" height="100" fill="#F2E8FF" stroke="#8C4FFF" stroke-width="2" rx="6"/>
  <text x="880" y="205" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E" text-anchor="middle">Amazon Bedrock</text>
  <text x="880" y="223" font-family="Amazon Ember, Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E" text-anchor="middle">Guardrails</text>
  <text x="880" y="245" font-family="Amazon Ember, Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle">PII 탐지</text>
  <text x="880" y="265" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#8C4FFF" text-anchor="middle">ApplyGuardrail API</text>

  <!-- Amazon CloudWatch + X-Ray -->
  <rect x="800" y="420" width="160" height="80" fill="#FFFFFF" stroke="#232F3E" stroke-width="2" rx="6"/>
  <text x="880" y="450" font-family="Amazon Ember, Arial, sans-serif" font-size="13" font-weight="bold" fill="#232F3E" text-anchor="middle">Amazon CloudWatch</text>
  <text x="880" y="475" font-family="Amazon Ember, Arial, sans-serif" font-size="11" fill="#666666" text-anchor="middle">Logs, Metrics, Traces</text>

  <!-- Arrows -->
  <!-- Client to Cognito -->
  <line x1="160" y1="240" x2="210" y2="230" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Cognito to Gateway -->
  <line x1="350" y1="230" x2="390" y2="190" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Gateway Internal Flow: Cedar → Router → Response -->
  <line x1="560" y1="220" x2="560" y2="235" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="560" y1="285" x2="560" y2="300" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Router to Lambda (bidirectional) -->
  <line x1="530" y1="285" x2="480" y2="420" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="460" y1="420" x2="510" y2="285" stroke="#999999" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowhead-secondary)"/>
  
  <!-- Lambda to DynamoDB (bidirectional) -->
  <line x1="570" y1="470" x2="610" y2="470" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="610" y1="490" x2="570" y2="490" stroke="#999999" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowhead-secondary)"/>
  
  <!-- Response Interceptor to Guardrails (bidirectional) -->
  <line x1="710" y1="330" x2="800" y2="250" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="800" y1="230" x2="710" y2="310" stroke="#999999" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowhead-secondary)"/>
  
  <!-- Gateway to CloudWatch -->
  <line x1="730" y1="330" x2="800" y2="450" stroke="#999999" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowhead-secondary)"/>

</svg>