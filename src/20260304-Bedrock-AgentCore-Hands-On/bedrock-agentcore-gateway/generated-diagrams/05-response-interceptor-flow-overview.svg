<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#232F3E"/>
    </marker>
  </defs>
  
  <!-- AWS Cloud Boundary -->
  <rect x="20" y="20" width="910" height="560" rx="12" fill="none" stroke="#232F3E" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="40" y="45" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E">AWS Cloud</text>
  
  <!-- Start Box -->
  <rect x="375" y="80" width="200" height="50" rx="6" fill="#FFFFFF" stroke="#147EBA" stroke-width="2"/>
  <text x="475" y="110" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E" text-anchor="middle">도구 실행 결과 수신</text>
  
  <!-- Arrow to Decision 1 -->
  <line x1="475" y1="130" x2="475" y2="160" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Decision 1: MCP Method -->
  <path d="M 475 160 L 575 200 L 475 240 L 375 200 Z" fill="#FFF3E0" stroke="#DD6B10" stroke-width="2"/>
  <text x="475" y="205" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="bold" fill="#232F3E" text-anchor="middle">MCP Method?</text>
  
  <!-- Left path: tools/list -->
  <line x1="375" y1="200" x2="200" y2="200" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="280" y="195" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle">tools/list</text>
  
  <rect x="75" y="175" width="180" height="50" rx="6" fill="#E6F2FF" stroke="#147EBA" stroke-width="1"/>
  <text x="165" y="205" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="bold" fill="#232F3E" text-anchor="middle">허용된 도구만 필터링</text>
  
  <line x1="165" y1="225" x2="165" y2="260" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="75" y="260" width="180" height="50" rx="6" fill="#FFFFFF" stroke="#3F8624" stroke-width="2"/>
  <text x="165" y="290" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="bold" fill="#232F3E" text-anchor="middle">필터링된 목록 반환</text>
  
  <!-- Right path: tools/call -->
  <line x1="475" y1="240" x2="475" y2="280" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="510" y="265" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="12" fill="#666666">tools/call</text>
  
  <!-- DynamoDB Query -->
  <rect x="375" y="280" width="200" height="50" rx="6" fill="#E8F5E9" stroke="#3F8624" stroke-width="2"/>
  <text x="475" y="310" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="bold" fill="#232F3E" text-anchor="middle">DynamoDB에서 역할 조회</text>
  
  <line x1="475" y1="330" x2="475" y2="360" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Decision 2: Role -->
  <path d="M 475 360 L 575 400 L 475 440 L 375 400 Z" fill="#FFF3E0" stroke="#DD6B10" stroke-width="2"/>
  <text x="475" y="405" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="bold" fill="#232F3E" text-anchor="middle">역할?</text>
  
  <!-- HR Manager path -->
  <line x1="575" y1="400" x2="750" y2="400" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="650" y="395" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle">HR Manager</text>
  
  <rect x="750" y="375" width="160" height="50" rx="6" fill="#FFFFFF" stroke="#3F8624" stroke-width="2"/>
  <text x="830" y="398" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="bold" fill="#232F3E" text-anchor="middle">전체 데이터 반환</text>
  <text x="830" y="413" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#666666" text-anchor="middle">(마스킹 없음)</text>
  
  <!-- Employee path -->
  <line x1="475" y1="440" x2="475" y2="470" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="510" y="460" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="12" fill="#666666">Employee</text>
  
  <!-- Decision 3: Self Data -->
  <path d="M 475 470 L 555 500 L 475 530 L 395 500 Z" fill="#FFF3E0" stroke="#DD6B10" stroke-width="2"/>
  <text x="475" y="505" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="bold" fill="#232F3E" text-anchor="middle">본인 데이터?</text>
  
  <!-- Yes path -->
  <line x1="555" y1="500" x2="670" y2="500" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="605" y="495" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle">Yes</text>
  
  <rect x="670" y="475" width="160" height="50" rx="6" fill="#FFFFFF" stroke="#3F8624" stroke-width="2"/>
  <text x="750" y="505" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="bold" fill="#232F3E" text-anchor="middle">전체 데이터 반환</text>
  
  <!-- No path -->
  <line x1="395" y1="500" x2="280" y2="500" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="330" y="495" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle">No</text>
  
  <rect x="150" y="475" width="130" height="50" rx="6" fill="#FDE8E8" stroke="#DD344C" stroke-width="2"/>
  <text x="215" y="505" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="bold" fill="#232F3E" text-anchor="middle">PII 마스킹 적용</text>
  
  <line x1="215" y1="475" x2="215" y2="420" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="140" y="370" width="150" height="50" rx="6" fill="#F2E8FF" stroke="#8C4FFF" stroke-width="2"/>
  <text x="215" y="388" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="bold" fill="#232F3E" text-anchor="middle">Amazon Bedrock</text>
  <text x="215" y="403" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="bold" fill="#232F3E" text-anchor="middle">Guardrails로</text>
  <text x="215" y="418" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="bold" fill="#232F3E" text-anchor="middle">PII 마스킹</text>
  
  <line x1="140" y1="395" x2="95" y2="370" stroke="#232F3E" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="30" y="325" width="130" height="45" rx="6" fill="#FFFFFF" stroke="#3F8624" stroke-width="2"/>
  <text x="95" y="353" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="bold" fill="#232F3E" text-anchor="middle">마스킹된 응답 반환</text>
</svg>