<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 550">
  <!-- Definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#232F3E"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3F8624"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#DD344C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="950" height="550" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="475" y="30" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="bold" fill="#232F3E" text-anchor="middle">Policy Engine - Client ID to Principal Mapping</text>

  <!-- Client Applications (Left) -->
  <rect x="30" y="80" width="140" height="80" fill="#FFFFFF" stroke="#147EBA" stroke-width="2" rx="6"/>
  <text x="100" y="105" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="bold" fill="#232F3E" text-anchor="middle">HR Manager App</text>
  <text x="100" y="125" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#666666" text-anchor="middle">client_id:</text>
  <text x="100" y="140" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#147EBA" text-anchor="middle">abc123...</text>
  <text x="100" y="155" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#999999" text-anchor="middle">(4개 도구 권한)</text>

  <rect x="30" y="190" width="140" height="80" fill="#FFFFFF" stroke="#147EBA" stroke-width="2" rx="6"/>
  <text x="100" y="215" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="bold" fill="#232F3E" text-anchor="middle">Employee App</text>
  <text x="100" y="235" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#666666" text-anchor="middle">client_id:</text>
  <text x="100" y="250" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#147EBA" text-anchor="middle">xyz789...</text>
  <text x="100" y="265" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#999999" text-anchor="middle">(2개 도구 권한)</text>

  <!-- Amazon Cognito -->
  <rect x="230" y="80" width="160" height="100" fill="#FFF3E0" stroke="#DD6B10" stroke-width="2" rx="6"/>
  <text x="310" y="105" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E" text-anchor="middle">Amazon Cognito</text>
  <text x="310" y="130" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#666666" text-anchor="middle">client_credentials</text>
  <text x="310" y="145" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#666666" text-anchor="middle">↓</text>
  <text x="310" y="160" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="bold" fill="#DD6B10" text-anchor="middle">JWT { sub: client_id }</text>

  <!-- AgentCore Gateway -->
  <rect x="230" y="210" width="160" height="80" fill="#E6F2FF" stroke="#147EBA" stroke-width="2" rx="6"/>
  <text x="310" y="235" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="bold" fill="#232F3E" text-anchor="middle">AgentCore Gateway</text>
  <text x="310" y="255" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#666666" text-anchor="middle">JWT sub</text>
  <text x="310" y="270" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#666666" text-anchor="middle">↓</text>
  <text x="310" y="285" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="bold" fill="#147EBA" text-anchor="middle">Cedar principal</text>

  <!-- Cedar Policy Engine (Large Box) -->
  <rect x="450" y="80" width="280" height="330" fill="#F2E8FF" stroke="#8C4FFF" stroke-width="2" rx="8"/>
  <text x="590" y="105" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="bold" fill="#232F3E" text-anchor="middle">Policy Engine</text>

  <!-- HR Manager Policy Card -->
  <rect x="470" y="130" width="240" height="100" fill="#FFFFFF" stroke="#8C4FFF" stroke-width="1.5" rx="6"/>
  <text x="590" y="150" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="bold" fill="#8C4FFF" text-anchor="middle">HR Manager Policy</text>
  <text x="590" y="170" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#232F3E" text-anchor="middle">principal ==</text>
  <text x="590" y="185" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="10" font-weight="bold" fill="#8C4FFF" text-anchor="middle">OAuthUser::"abc123..."</text>
  <text x="590" y="205" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#3F8624" text-anchor="middle">→ 4개 도구 허용</text>
  <text x="590" y="220" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#999999" text-anchor="middle">(HR 전용 도구 포함)</text>

  <!-- Employee Policy Card -->
  <rect x="470" y="250" width="240" height="100" fill="#FFFFFF" stroke="#8C4FFF" stroke-width="1.5" rx="6"/>
  <text x="590" y="270" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="bold" fill="#8C4FFF" text-anchor="middle">Employee Policy</text>
  <text x="590" y="290" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#232F3E" text-anchor="middle">principal ==</text>
  <text x="590" y="305" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="10" font-weight="bold" fill="#8C4FFF" text-anchor="middle">OAuthUser::"xyz789..."</text>
  <text x="590" y="325" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#3F8624" text-anchor="middle">→ 2개 도구 허용</text>
  <text x="590" y="340" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#999999" text-anchor="middle">(기본 도구만)</text>

  <!-- Evaluation Label -->
  <text x="590" y="385" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#666666" text-anchor="middle">평가: principal, action, resource</text>

  <!-- Results (Right) -->
  <rect x="780" y="140" width="140" height="70" fill="#E8F5E9" stroke="#3F8624" stroke-width="2" rx="6"/>
  <text x="850" y="165" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="16" font-weight="bold" fill="#3F8624" text-anchor="middle">ALLOW</text>
  <text x="850" y="185" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#666666" text-anchor="middle">↓</text>
  <text x="850" y="200" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#3F8624" text-anchor="middle">Tool 실행</text>

  <rect x="780" y="240" width="140" height="70" fill="#FDE8E8" stroke="#DD344C" stroke-width="2" rx="6"/>
  <text x="850" y="265" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="16" font-weight="bold" fill="#DD344C" text-anchor="middle">DENY</text>
  <text x="850" y="285" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#666666" text-anchor="middle">↓</text>
  <text x="850" y="300" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#DD344C" text-anchor="middle">접근 거부</text>

  <!-- Arrows -->
  <!-- Client to Cognito -->
  <path d="M 170 120 L 225 120" stroke="#232F3E" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="197" y="115" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#666666" text-anchor="middle">인증</text>
  
  <path d="M 170 230 L 225 150" stroke="#232F3E" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Cognito to Gateway -->
  <path d="M 310 180 L 310 205" stroke="#DD6B10" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="340" y="195" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#DD6B10">JWT</text>

  <!-- Gateway to Policy Engine -->
  <path d="M 390 250 L 445 250" stroke="#147EBA" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="417" y="240" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#147EBA" text-anchor="middle">principal,</text>
  <text x="417" y="250" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#147EBA" text-anchor="middle">action,</text>
  <text x="417" y="260" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#147EBA" text-anchor="middle">resource</text>

  <!-- Policy Engine to ALLOW -->
  <path d="M 730 175 L 775 175" stroke="#3F8624" stroke-width="2" fill="none" marker-end="url(#arrowhead-green)"/>

  <!-- Policy Engine to DENY -->
  <path d="M 730 275 L 775 275" stroke="#DD344C" stroke-width="2" fill="none" marker-end="url(#arrowhead-red)"/>

  <!-- Key Mapping Highlight Box -->
  <rect x="220" y="330" width="180" height="90" fill="#FFF3E0" stroke="#DD6B10" stroke-width="1.5" stroke-dasharray="4,4" rx="6"/>
  <text x="310" y="350" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="bold" fill="#DD6B10" text-anchor="middle">핵심 매핑</text>
  <text x="310" y="370" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#232F3E" text-anchor="middle">client_id</text>
  <text x="310" y="385" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#666666" text-anchor="middle">==</text>
  <text x="310" y="400" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#232F3E" text-anchor="middle">JWT sub</text>
  <text x="310" y="415" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#666666" text-anchor="middle">==</text>
  <text x="310" y="430" font-family="Amazon Ember, Helvetica Neue, Arial, sans-serif" font-size="10" font-weight="bold" fill="#8C4FFF" text-anchor="middle">Cedar principal</text>


</svg>